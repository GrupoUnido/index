<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso de Usuario - Valentino</title>

  <style>
    :root{
      --bg: #0b0f19;
      --panel: rgba(255,255,255,.06);
      --card: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --accent: #a78bfa;
      --accent2:#22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 18px;
      --max: 1120px;
      /* Variables para tabla en modo oscuro */
      --table-bg-admin: #3d0e0e; /* Fondo para filas de Admin */
      --table-bg-header: #2f333c; /* Fondo para encabezado de tabla */
    }

    html[data-theme="light"]{
      --bg:#f7f7fb;
      --panel: rgba(17, 24, 39, .04);
      --card: rgba(17, 24, 39, .06);
      --border: rgba(17, 24, 39, .10);
      --text: rgba(17,24,39,.92);
      --muted: rgba(17,24,39,.70);
      --shadow: 0 20px 60px rgba(17,24,39,.14);
      /* Variables para tabla en modo claro */
      --table-bg-admin: #ffe0e0;
      --table-bg-header: #f2f2f2;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(167,139,250,.18), transparent 55%),
                  radial-gradient(900px 700px at 90% 20%, rgba(34,197,94,.12), transparent 60%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .container{ width:min(var(--max), 92%); margin-inline:auto; }

    a{ color:inherit; text-decoration:none; }
    .muted{ color: var(--muted); }
    .small{ font-size:.9rem; }
    .accent{ color: var(--accent); }

    /* Layout login */
    .auth-center {
      max-width: 420px;
      width: 100%;
    }

    .auth{
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .auth-header h2 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
    }

    .tabs{ display:flex; gap:.6rem; margin-bottom: 1.2rem; justify-content: center; }
    .tab{
      border:1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding:.6rem .8rem;
      border-radius: 14px;
      cursor:pointer;
      transition: .2s all;
    }
    .tab:hover { transform: translateY(-1px); }
    .tab.active{
      background: linear-gradient(135deg, rgba(167,139,250,1), rgba(34,197,94,1));
      border-color: transparent;
      color:white;
    }

    .input-group { margin-bottom: 1rem; }

    .input{
      display:grid;
      gap:.35rem;
      padding:.75rem .9rem;
      border-radius: 18px;
      border:1px solid var(--border);
      background: var(--card);
    }
    .input span{ font-size:.85rem; color: var(--muted); }
    .input input{
      width:100%;
      background: transparent;
      border:0;
      outline: none;
      color: var(--text);
      font-size: 1rem;
    }

    .btn{
      border:1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding:.85rem 1rem;
      border-radius: 16px;
      cursor:pointer;
      display:block;
      width: 100%;
      font-weight:600;
      transition:.2s transform, .2s opacity;
      margin-top: 1.5rem;
    }
    .btn:hover{ transform: translateY(-1px); }
    .btn.primary{
      border-color: transparent;
      background: linear-gradient(135deg, rgba(167,139,250,1), rgba(34,197,94,1));
      color:white;
    }

    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .hidden{ display:none !important; }

    /* Admin */
    #client-list-container {
      width: min(1000px, 98vw);
      margin: 2rem auto;
      padding: 1rem;
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: none;
    }
    #client-list-container h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }

    .logout-btn-container {
      text-align: center;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

<!-- Header -->
<header class="site-header" style="position: static; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 2rem;">
  <div class="container header-inner">
    <a class="logo" href="index.html" style="display: flex; align-items: center; gap: 0.5rem;">
      <span class="logo-mark">🐤</span>
      <span class="logo-text" style="font-size: 0.9rem;">APPROAMOLI<span class="dot">.</span>Online</span>
    </a>

    <nav class="nav" style="display: flex; gap: 2rem;">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="producto.html" class="nav-link">Productos</a>
      <a href="Nosotros.html" class="nav-link">Nosotros</a>
      <a href="contacto.html" class="nav-link" style="color: var(--accent);">Contacto</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="logout-btn-container">
    <button id="logout-button" class="btn" style="display:none; width:auto; padding:.6rem 1rem;">
      Cerrar Sesión
    </button>
  </div>

  <div class="auth-center auth-grid" style="margin: auto;">
    <div class="auth">

      <header class="auth-header">
        <h2>Acceso de Usuario</h2>
        <p class="muted small">Inicia sesión o crea tu cuenta</p>
      </header>

      <div class="tabs">
        <button id="tab-login" class="tab active" type="button">
          Iniciar Sesión
        </button>
        <button id="tab-register" class="tab" type="button">
          Crear Cuenta
        </button>
      </div>

      <!-- LOGIN -->
      <form id="login-form">
        <div class="input-group">
          <div class="input">
            <span>Email o Nombre de Usuario:</span>
            <input type="text" id="login-email" required placeholder="Tu email o nombre de usuario">
          </div>
        </div>

        <div class="input-group">
          <div class="input">
            <span>Contraseña:</span>
            <input type="password" id="login-password" required placeholder="Tu contraseña">
          </div>
        </div>

        <button type="submit" class="btn primary">Iniciar Sesión</button>
        <div id="login-message" class="message small hidden"></div>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="hidden">
        <div class="input-group">
          <div class="input">
            <span>Nombre de Usuario:</span>
            <input type="text" id="reg-username" required placeholder="Ej: YuliannyAlba">
          </div>
        </div>

        <div class="input-group">
          <div class="input">
            <span>Correo Electrónico:</span>
            <input type="email" id="reg-email" required placeholder="ejemplo@correo.com">
          </div>
        </div>

        <div class="input-group">
          <div class="input">
            <span>Contraseña:</span>
            <input type="password" id="reg-password" required placeholder="Crea una contraseña">
          </div>
        </div>

        <button type="submit" class="btn primary">Registrarme</button>
        <div id="register-message" class="message small hidden"></div>
      </form>

    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="client-list-container"></div>
</main>

<script>
  // ==============================================================================
  // CONFIG
  // ==============================================================================
  const API = "http://localhost:3000";

  // ==============================================================================
  // ELEMENTOS DEL DOM (AQUÍ VA ESTE CÓDIGO)
  // ==============================================================================
  const registerForm = document.getElementById('register-form');
  const loginForm = document.getElementById('login-form');
  const registerMessage = document.getElementById('register-message');
  const loginMessage = document.getElementById('login-message');

  // ✅ AQUÍ MISMO VA:
  const clientListContainer = document.getElementById('client-list-container');

  const logoutButton = document.getElementById('logout-button');
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');

  // ==============================================================================
  // UI helpers
  // ==============================================================================
  function showMsg(el, text, ok = true) {
    el.textContent = text;
    el.classList.remove("hidden");
    el.style.color = ok ? "#22c55e" : "#ff6b6b";
  }

  function clearMsg(el){
    el.textContent = "";
    el.classList.add("hidden");
  }

  function showForm(type){
    clearMsg(loginMessage);
    clearMsg(registerMessage);

    tabLogin.classList.remove("active");
    tabRegister.classList.remove("active");

    if(type === "login"){
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      tabLogin.classList.add("active");
    } else {
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      tabRegister.classList.add("active");
    }
  }

  tabLogin.addEventListener("click", () => showForm("login"));
  tabRegister.addEventListener("click", () => showForm("register"));

  // ==============================================================================
  // AUTH persistence (simple demo)
  // ==============================================================================
  function setLoggedIn(user){
    localStorage.setItem("user", JSON.stringify(user));
    logoutButton.style.display = "inline-block";
  }

  function setLoggedOut(){
    localStorage.removeItem("user");
    logoutButton.style.display = "none";
    clientListContainer.style.display = "none";
    clientListContainer.innerHTML = "";
  }

  function loadSession(){
    const raw = localStorage.getItem("user");
    if(!raw) return;
    const user = JSON.parse(raw);
    logoutButton.style.display = "inline-block";

    if(user.role === "admin"){
      clientListContainer.style.display = "block";
      clientListContainer.innerHTML = `<h2>Panel Admin</h2><p>Bienvenido, <b>${user.username}</b> ✅</p>`;
    }
  }

  loadSession();

  logoutButton.addEventListener("click", () => {
    setLoggedOut();
    showMsg(loginMessage, "Sesión cerrada.", true);
    showForm("login");
  });

  // ==============================================================================
  // REGISTER
  // ==============================================================================
  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("reg-username").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;

    try{
      const res = await fetch(`${API}/api/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if(!res.ok){
        return showMsg(registerMessage, data.msg || "Error registrando.", false);
      }

      showMsg(registerMessage, data.msg || "✅ Usuario registrado.", true);
      registerForm.reset();
      showForm("login");
    }catch(err){
      showMsg(registerMessage, "No se pudo conectar al servidor.", false);
    }
  });

  // ==============================================================================
  // LOGIN
  // ==============================================================================
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const userOrEmail = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    try{
      const res = await fetch(`${API}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userOrEmail, password })
      });

      const data = await res.json();

      if(!res.ok){
        return showMsg(loginMessage, data.msg || "Error iniciando sesión.", false);
      }

      showMsg(loginMessage, data.msg || "✅ Login correcto.", true);
      setLoggedIn(data.user);

      if(data.user.role === "admin"){
        clientListContainer.style.display = "block";
        clientListContainer.innerHTML = `<h2>Panel Admin</h2><p>Bienvenido, <b>${data.user.username}</b> ✅</p>`;
      }

    }catch(err){
      showMsg(loginMessage, "No se pudo conectar al servidor.", false);
    }
  });
</script>

</body>
</html>
